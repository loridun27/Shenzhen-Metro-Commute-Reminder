<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>深圳地铁 · 通勤提醒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3ede1;
  --surface: #fbf8f1;
  --surface-mute: #ece4d2;
  --ink: #2b2620;
  --ink-soft: #7a7060;
  --ink-mute: #b3a890;
  --border: rgba(43,38,32,0.10);
  --border-strong: rgba(43,38,32,0.16);
  --accent: #D97757;
  --accent-bg: #D9775714;
  --accent-shadow: #D9775738;
  --success: #5a7a4f;
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "PingFang SC", system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* Header */
.app-header {
  padding: 16px 20px 14px;
}
.app-header .sub {
  font-size: 10px; letter-spacing: 2.4px;
  color: var(--ink-mute); font-weight: 500;
}
.app-header h1 {
  margin: 3px 0 0;
  font-family: 'Noto Serif SC', Georgia, serif;
  font-weight: 600; font-size: 22px; line-height: 1.15;
  color: var(--ink); letter-spacing: -0.3px;
}
.app-header .hint {
  margin-top: 3px;
  font-size: 11.5px; color: var(--ink-soft); letter-spacing: 0.3px;
}
.app-header .hint b {
  color: var(--ink); font-weight: 600;
}

/* Mode Toggle */
.mode-toggle {
  display: flex;
  background: var(--surface-mute);
  border-radius: 10px;
  padding: 3px;
  margin: 0 20px 14px;
}
.mode-toggle button {
  flex: 1; padding: 9px; border: none; border-radius: 8px;
  font-size: 13.5px; font-weight: 500; cursor: pointer;
  background: transparent; color: var(--ink-mute);
  font-family: 'Noto Sans SC', system-ui; transition: all 0.2s;
  letter-spacing: 0.4px;
}
.mode-toggle button.active {
  background: var(--surface); color: var(--ink);
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

/* Setup Cards */
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 0 6px 12px;
}
.setup-card .label {
  font-size: 10px; font-weight: 500; letter-spacing: 2.2px;
  color: var(--accent); margin-bottom: 12px;
}
.setup-card .label.muted { color: var(--ink-mute); }
.setup-card select {
  width: 100%; padding: 10px 32px 10px 12px;
  border: 1px solid var(--border-strong); border-radius: 10px;
  font-size: 14px; color: var(--ink);
  background: var(--bg);
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23b3a890' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 12px center;
  font-family: 'Noto Sans SC', system-ui;
  transition: border-color 0.2s;
}
.setup-card select:focus { outline: none; border-color: var(--accent); }
.select-row { display: flex; gap: 8px; margin-bottom: 8px; }
.select-row select { flex: 1; }

.reminder-cfg {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; font-size: 11.5px; color: var(--ink-soft);
  letter-spacing: 0.2px;
}
.reminder-cfg input {
  width: 42px; padding: 5px; text-align: center;
  border: 1px solid var(--border-strong); border-radius: 8px;
  font-size: 13px; font-family: 'Noto Sans SC', system-ui;
  background: var(--bg); color: var(--ink);
}
.reminder-cfg input:focus { outline: none; border-color: var(--accent); }

/* Connector */
.setup-connector {
  display: flex; align-items: center; gap: 10px;
  padding-left: 26px; margin: -2px 0;
}
.setup-connector-dots {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.setup-connector-dots span {
  width: 3px; height: 3px; border-radius: 999px; background: var(--ink-mute);
}

.swap-btn {
  display: flex; justify-content: center; margin: -4px 0; z-index: 2; position: relative;
}
.swap-btn button {
  width: 32px; height: 32px; border-radius: 999px;
  border: 1px solid var(--border-strong); background: var(--surface);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--ink-soft);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05); transition: all 0.15s;
}
.swap-btn button:active { transform: scale(0.95); background: var(--surface-mute); }

/* Start Button */
.start-btn {
  display: block; width: calc(100% - 12px); margin: 6px 6px 0;
  padding: 14px; border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 500; letter-spacing: 0.4px;
  cursor: pointer; font-family: 'Noto Sans SC', system-ui;
  background: var(--accent); color: #fbf8f1;
  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 18px var(--accent-shadow);
  transition: transform 0.12s, opacity 0.12s;
}
.start-btn:active { transform: scale(0.98); opacity: 0.9; }

.hidden { display: none !important; }

/* ===== Journey View ===== */

/* Progress Track */
.progress-track {
  margin: 0 20px 14px;
  padding: 10px 14px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center;
}
.progress-node {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; min-width: 50px;
}
.progress-dot {
  width: 9px; height: 9px; border-radius: 999px;
  border: 1.5px solid var(--ink-mute);
  background: transparent; transition: all 0.3s;
}
.progress-dot.active {
  background: var(--accent); border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}
.progress-dot.done {
  background: var(--success); border-color: var(--success);
}
.progress-node-label {
  font-size: 9.5px; letter-spacing: 1.2px; color: var(--ink-mute); font-weight: 500;
}
.progress-node-label.lit { color: var(--ink); }
.progress-line {
  flex: 1; height: 2px; border-radius: 999px;
  background: var(--surface-mute); position: relative;
  overflow: hidden; margin: 0 -4px; margin-bottom: 12px;
}
.progress-line-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--accent); transition: width 0.4s ease; width: 0%;
}
.progress-line-fill.done { background: var(--success); width: 100%; }

/* Journey Card */
.j-card {
  border-radius: var(--radius);
  background: transparent;
  border: 1px solid var(--border);
  padding: 14px;
  margin: 0 6px 0;
  position: relative;
  transition: opacity 0.3s, border-color 0.3s, background 0.3s;
}
.j-card.upcoming { opacity: 0.5; }
.j-card.active {
  background: var(--surface);
  border-color: var(--border-strong);
}
.j-card.active::before {
  content: ''; position: absolute;
  left: 0; top: 18px; bottom: 18px; width: 2.5px;
  border-radius: 999px; background: var(--accent);
}
.j-card.done-card {
  border: none; background: transparent;
  padding: 8px 14px;
}

/* Line Badge */
.line-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 999px;
  font-family: -apple-system, system-ui; font-weight: 600; font-size: 12px;
  flex: none;
}

.j-card-header { display: flex; align-items: flex-start; gap: 11px; }
.j-card-role {
  font-size: 10px; letter-spacing: 2.2px; font-weight: 500; margin-bottom: 3px;
}
.j-card-station {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-weight: 600; font-size: 20px; line-height: 1.15;
  color: var(--ink); letter-spacing: -0.2px;
}
.j-card-pinyin {
  font-family: 'SF Mono', ui-monospace, Menlo, monospace;
  font-size: 8.5px; letter-spacing: 1.2px; color: var(--ink-mute);
  margin-left: 8px; vertical-align: baseline;
}
.j-card-detail {
  margin-top: 4px; font-size: 11.5px; color: var(--ink-soft);
  letter-spacing: 0.2px; line-height: 1.5;
}

/* Reminder bar inside card */
.remind-bar {
  margin-top: 10px; display: flex; align-items: center; gap: 6px;
  padding: 7px 10px; border-radius: 8px;
  font-size: 11px; letter-spacing: 0.2px;
  transition: background 0.2s, color 0.2s;
}
.remind-bar.off { background: var(--surface-mute); color: var(--ink-soft); }
.remind-bar.on { background: var(--accent-bg); color: var(--accent); }
.remind-bar svg { flex: none; }

.pulse-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 999px;
  background: var(--accent); margin-right: 4px; vertical-align: 1px;
  animation: srPulse 1.6s ease-out infinite;
}
@keyframes srPulse {
  0%   { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
  70%  { box-shadow: 0 0 0 6px transparent; opacity: 0.4; }
  100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
}

.listening-badge {
  font-family: 'SF Mono', ui-monospace, Menlo, monospace;
  font-size: 9.5px; letter-spacing: 0.6px;
  padding: 2px 7px; border-radius: 999px;
  background: #D9775722; color: var(--accent);
}

/* Buttons */
.j-btn-row { display: flex; gap: 8px; margin-top: 10px; }

.btn-primary {
  flex: 1; height: 38px; border-radius: 10px; border: none;
  padding: 0 14px; font-family: 'Noto Sans SC', system-ui;
  font-weight: 500; font-size: 13.5px; letter-spacing: 0.4px;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--accent); color: #fbf8f1;
  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 18px var(--accent-shadow);
  transition: transform 0.12s, opacity 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled {
  background: var(--surface-mute); color: var(--ink-mute);
  box-shadow: none; cursor: not-allowed;
}

.btn-ghost {
  flex: 1; height: 38px; border-radius: 10px;
  padding: 0 14px; font-family: 'Noto Sans SC', system-ui;
  font-weight: 500; font-size: 13.5px; letter-spacing: 0.4px;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: transparent; color: var(--ink);
  border: 1px solid var(--border-strong);
  transition: transform 0.12s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-ghost:active { transform: scale(0.97); background: var(--surface-mute); }
.btn-ghost:disabled {
  color: var(--ink-mute); border-color: var(--border); cursor: not-allowed;
}
.btn-ghost.remind-on {
  background: var(--accent); border-color: var(--accent); color: #fbf8f1;
}

.btn-advance {
  flex: 1; height: 36px; border-radius: 10px;
  padding: 0 14px; font-family: 'Noto Sans SC', system-ui;
  font-weight: 500; font-size: 12.5px; letter-spacing: 0.3px;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: #5a7a4f14; color: var(--success);
  border: 1px solid #5a7a4f40;
  transition: transform 0.12s, background 0.15s;
}
.btn-advance:active { transform: scale(0.97); background: var(--success); color: #fbf8f1; }

/* Journey connector */
.j-connector {
  display: flex; align-items: center; gap: 10px;
  padding-left: 26px; margin: 2px 0;
}
.j-connector-dots {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.j-connector-dots span {
  width: 3px; height: 3px; border-radius: 999px;
}
.j-connector-label {
  font-size: 10px; letter-spacing: 1.2px; font-weight: 500;
}

/* Done state compact */
.done-row {
  display: flex; align-items: center; gap: 10px;
}
.done-check {
  width: 18px; height: 18px; border-radius: 999px;
  background: var(--success); color: #fbf8f1;
  display: inline-flex; align-items: center; justify-content: center; flex: none;
}
.done-info { flex: 1; min-width: 0; }
.done-title { font-size: 12.5px; color: var(--ink); font-weight: 500; letter-spacing: 0.2px; }
.done-hint { font-size: 10.5px; color: var(--ink-mute); margin-top: 1px; letter-spacing: 0.2px; }
.done-undo {
  background: none; border: none; cursor: pointer; padding: 4px 6px;
  font-family: 'Noto Sans SC', system-ui; font-size: 11px;
  color: var(--ink-mute); letter-spacing: 0.4px;
}

/* Reset */
.reset-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: calc(100% - 12px); margin: 14px 6px 0; padding: 12px;
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--ink-soft);
  font-size: 13px; font-family: 'Noto Sans SC', system-ui;
  cursor: pointer; letter-spacing: 0.3px;
}
.reset-btn:active { background: var(--surface-mute); }

/* Alert */
.alert-overlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(43,38,32,0.4); z-index: 100;
  justify-content: center; align-items: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.alert-overlay.show { display: flex; }
.alert-box {
  background: var(--surface); border-radius: 20px;
  padding: 32px 28px; text-align: center;
  max-width: 300px; width: 85%;
  animation: alertPop 0.3s ease;
  border: 1px solid var(--border);
}
@keyframes alertPop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.alert-box .alert-icon { font-size: 44px; margin-bottom: 12px; }
.alert-box h2 {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 19px; font-weight: 600; margin-bottom: 6px; color: var(--ink);
}
.alert-box p { color: var(--ink-soft); font-size: 13px; margin-bottom: 20px; letter-spacing: 0.2px; }
.alert-box button {
  width: 100%; padding: 13px; background: var(--accent); color: #fbf8f1;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: 'Noto Sans SC', system-ui;
  box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 18px var(--accent-shadow);
}

/* SVG icons inline */
.icon-bell, .icon-bell-off, .icon-check, .icon-reset { display: inline-flex; vertical-align: middle; }
</style>
</head>
<body>

<div class="container">
  <!-- ====== SETUP ====== -->
  <div id="setupSection">
    <div class="app-header">
      <div class="sub">通勤提醒</div>
      <h1>设置路线</h1>
      <div class="hint">选择今日通勤路线</div>
    </div>

    <div class="mode-toggle" id="modeToggle">
      <button class="active" onclick="setMode('direct')">直达</button>
      <button onclick="setMode('transfer')">换乘</button>
    </div>

    <div class="setup-card">
      <div class="label">起点</div>
      <div class="select-row">
        <select id="startLine" onchange="onStartLineChange()"><option value="">选择线路</option></select>
        <select id="startStation" onchange="onStartStationChange()"><option value="">选择站点</option></select>
      </div>
      <select id="startDirection" onchange="onStartDirectionChange()"><option value="">选择方向</option></select>
    </div>

    <div class="swap-btn"><button onclick="swapRoute()" title="交换起终点">⇅</button></div>

    <div class="setup-card hidden" id="transferCard">
      <div class="label">换乘</div>
      <div class="select-row">
        <select id="transferStation" onchange="onTransferStationChange()"><option value="">选择换乘站</option></select>
        <select id="transferLine" onchange="onTransferLineChange()"><option value="">换乘线路</option></select>
      </div>
      <select id="transferDirection" onchange="onTransferDirectionChange()"><option value="">选择方向</option></select>
      <div class="reminder-cfg">
        提前 <input type="number" id="transferRemindN" value="1" min="1" max="10"> 站提醒换乘
      </div>
    </div>

    <div class="setup-connector hidden" id="endSpacer">
      <div class="setup-connector-dots"><span></span><span></span><span></span></div>
    </div>

    <div class="setup-card">
      <div class="label muted">终点</div>
      <select id="endStation"><option value="">选择站点</option></select>
      <div class="reminder-cfg">
        提前 <input type="number" id="endRemindN" value="1" min="1" max="10"> 站提醒下车
      </div>
    </div>

    <button class="start-btn" onclick="startJourney()">开始行程</button>
  </div>

  <!-- ====== JOURNEY ====== -->
  <div id="journeySection" class="hidden">
    <div class="app-header" id="jHeader">
      <div class="sub" id="jHeaderSub">通勤中</div>
      <h1 id="jHeaderTitle">今日通勤</h1>
      <div class="hint" id="jHeaderHint"></div>
    </div>

    <!-- Progress Track -->
    <div class="progress-track" id="progressTrack"></div>

    <!-- Cards Container -->
    <div id="jCards"></div>

    <button class="reset-btn" onclick="resetJourney()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      重新设置路线
    </button>
  </div>
</div>

<!-- Alert -->
<div class="alert-overlay" id="alertOverlay">
  <div class="alert-box">
    <div class="alert-icon" id="alertIcon">🔔</div>
    <h2 id="alertTitle">到站提醒</h2>
    <p id="alertMsg"></p>
    <button onclick="dismissAlert()">知道了</button>
  </div>
</div>

<script>
// ===== SVG Icons =====
const SVG = {
  bell: (c='currentColor', s=13) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>`,
  bellOff: (c='currentColor', s=13) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.9 17.9 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><path d="M1 1l22 22"/></svg>`,
  check: (c='#fbf8f1', s=10) => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
};

// ===== Pinyin Map (common stations) =====
const pinyinMap = {'罗湖':'LUOHU','国贸':'GUOMAO','老街':'LAOJIE','大剧院':'DAJUYUAN','科学馆':'KEXUEGUAN','华强路':'HUAQIANGLU','岗厦':'GANGXIA','会展中心':'HUIZHANZX','购物公园':'GOUWUGY','香蜜湖':'XIANGMIHU','车公庙':'CHEGONGMIAO','竹子林':'ZHUZILIN','世界之窗':'SHIJIEZHICHUANG','白石洲':'BAISHIZHOU','高新园':'GAOXINYUAN','深大':'SHENDA','桃园':'TAOYUAN','前海湾':'QIANHAIWAN','宝安中心':'BAOANZHONGXIN','西乡':'XIXIANG','机场东':'JICHANGDONG','后海':'HOUHAI','红树湾':'HONGSHUWAN','福田':'FUTIAN','市民中心':'SHIMINZX','华强北':'HUAQIANGBEI','黄贝岭':'HUANGBEILING','少年宫':'SHAONIANGONG','莲花村':'LIANHUACUN','华新':'HUAXIN','红岭':'HONGLING','布吉':'BUJI','大运':'DAYUN','龙城广场':'LONGCHENGGC','双龙':'SHUANGLONG','福田口岸':'FUTIANKOUAN','深圳北站':'SHENZHENBEIZHAN','龙华':'LONGHUA','赤湾':'CHIWAN','留仙洞':'LIUXIANDONG','灵芝':'LINGZHI','民治':'MINZHI','五和':'WUHE','安托山':'ANTUOSHAN','农林':'NONGLIN','皇岗口岸':'HUANGGANGKA','太安':'TAIAN','黄木岗':'HUANGMUGANG','红树湾南':'HONGSHUWANNAN','南山':'NANSHAN','机场北':'JICHANGBEI','松岗':'SONGGANG','景田':'JINGTAN','银湖':'YINHU','光明':'GUANGMING','梅林关':'MEILINGUAN','福民':'FUMIN','清湖':'QINGHU','坂田':'BANTIAN','岗厦北':'GANGXIABEI','平湖':'PINGHU','前湾':'QIANWAN','文锦':'WENJIN','碧头':'BITOU'};
function getPinyin(name) { return pinyinMap[name] || ''; }

const multiLineStations = {};
Object.entries(metroData).forEach(([line, sts]) => {
  sts.forEach(s => {
    if (!multiLineStations[s]) multiLineStations[s] = [];
    if (!multiLineStations[s].includes(line)) multiLineStations[s].push(line);
  });
});
const transferStationMap = {};
Object.entries(multiLineStations).forEach(([s, lines]) => {
  if (lines.length > 1) transferStationMap[s] = lines;
});

// ===== State =====
let mode = 'direct';
let audioCtx = null;
let J = null; // journey state

// ===== Mode =====
function setMode(m) {
  mode = m;
  document.querySelectorAll('#modeToggle button').forEach((b, i) => {
    b.classList.toggle('active', (m === 'direct' && i === 0) || (m === 'transfer' && i === 1));
  });
  document.getElementById('transferCard').classList.toggle('hidden', m === 'direct');
  document.getElementById('endSpacer').classList.toggle('hidden', m === 'direct');
  clearSel('transferStation'); clearSel('transferLine'); clearSel('transferDirection'); clearSel('endStation');
  updateEndOptions();
}

function clearSel(id) {
  const s = document.getElementById(id);
  const ph = s.options[0]?.textContent || '';
  s.innerHTML = `<option value="">${ph}</option>`;
}

// ===== Setup Logic =====
function initLines() {
  const sel = document.getElementById('startLine');
  Object.keys(metroData).forEach(l => sel.appendChild(new Option(l, l)));
}

function onStartLineChange() {
  const line = document.getElementById('startLine').value;
  const sSel = document.getElementById('startStation');
  const dSel = document.getElementById('startDirection');
  sSel.innerHTML = '<option value="">选择站点</option>';
  dSel.innerHTML = '<option value="">选择方向</option>';
  clearSel('endStation');
  if (!line) return;
  metroData[line].forEach(s => sSel.appendChild(new Option(s, s)));
  const st = metroData[line];
  dSel.appendChild(new Option('往 ' + st[st.length - 1] + ' 方向', 'forward'));
  dSel.appendChild(new Option('往 ' + st[0] + ' 方向', 'backward'));
  if (mode === 'transfer') updateTransferOptions();
}
function onStartStationChange() { updateEndOptions(); }
function onStartDirectionChange() { updateEndOptions(); }

function updateEndOptions() {
  mode === 'direct' ? updateDirectEnd() : updateTransferOptions();
}

function updateDirectEnd() {
  const line = document.getElementById('startLine').value;
  const station = document.getElementById('startStation').value;
  const dir = document.getElementById('startDirection').value;
  const endSel = document.getElementById('endStation');
  endSel.innerHTML = '<option value="">选择站点</option>';
  if (!line || !station || !dir) return;
  const st = metroData[line], idx = st.indexOf(station);
  if (idx === -1) return;
  const avail = dir === 'forward' ? st.slice(idx + 1) : st.slice(0, idx).reverse();
  avail.forEach(s => endSel.appendChild(new Option(s, s)));
}

function updateTransferOptions() {
  const line = document.getElementById('startLine').value;
  const tSel = document.getElementById('transferStation');
  tSel.innerHTML = '<option value="">选择换乘站</option>';
  clearSel('transferLine'); clearSel('transferDirection'); clearSel('endStation');
  if (!line) return;
  metroData[line].forEach(s => {
    if (transferStationMap[s]) {
      const others = transferStationMap[s].filter(l => l !== line);
      if (others.length > 0) tSel.appendChild(new Option(s + ' (' + others.join('/') + ')', s));
    }
  });
}
function onTransferStationChange() {
  const station = document.getElementById('transferStation').value;
  const startLine = document.getElementById('startLine').value;
  const tl = document.getElementById('transferLine');
  tl.innerHTML = '<option value="">换乘线路</option>';
  clearSel('transferDirection'); clearSel('endStation');
  if (!station || !transferStationMap[station]) return;
  const others = transferStationMap[station].filter(l => l !== startLine);
  others.forEach(l => tl.appendChild(new Option(l, l)));
  if (others.length === 1) { tl.value = others[0]; onTransferLineChange(); }
}
function onTransferLineChange() {
  const tLine = document.getElementById('transferLine').value;
  const tStation = document.getElementById('transferStation').value;
  const td = document.getElementById('transferDirection');
  td.innerHTML = '<option value="">选择方向</option>'; clearSel('endStation');
  if (!tLine || !tStation) return;
  const st = metroData[tLine];
  td.appendChild(new Option('往 ' + st[st.length - 1] + ' 方向', 'forward'));
  td.appendChild(new Option('往 ' + st[0] + ' 方向', 'backward'));
}
function onTransferDirectionChange() {
  const tLine = document.getElementById('transferLine').value;
  const tStation = document.getElementById('transferStation').value;
  const tDir = document.getElementById('transferDirection').value;
  const endSel = document.getElementById('endStation');
  endSel.innerHTML = '<option value="">选择站点</option>';
  if (!tLine || !tStation || !tDir) return;
  const st = metroData[tLine], idx = st.indexOf(tStation);
  const avail = tDir === 'forward' ? st.slice(idx + 1) : st.slice(0, idx).reverse();
  avail.forEach(s => endSel.appendChild(new Option(s, s)));
}

function swapRoute() {
  if (mode !== 'direct') return;
  const line = document.getElementById('startLine').value;
  const sS = document.getElementById('startStation').value;
  const eS = document.getElementById('endStation').value;
  const dir = document.getElementById('startDirection').value;
  if (!line || !sS || !eS) return;
  document.getElementById('startDirection').value = dir === 'forward' ? 'backward' : 'forward';
  document.getElementById('startStation').value = eS;
  updateDirectEnd();
  setTimeout(() => { document.getElementById('endStation').value = sS; }, 30);
}

function getStationsBetween(line, from, dir, to) {
  const st = metroData[line];
  const fi = st.indexOf(from), ti = st.indexOf(to);
  if (fi === -1 || ti === -1) return [];
  return dir === 'forward' ? st.slice(fi, ti + 1) : st.slice(ti, fi + 1).reverse();
}

// ===== Start Journey =====
function startJourney() {
  const sLine = document.getElementById('startLine').value;
  const sStation = document.getElementById('startStation').value;
  const sDir = document.getElementById('startDirection').value;
  const eStation = document.getElementById('endStation').value;
  const eR = parseInt(document.getElementById('endRemindN').value) || 1;

  if (!sLine || !sStation || !sDir || !eStation) {
    showAlert('⚠️', '信息不完整', '请填写完整的路线信息'); return;
  }

  const legs = []; // each: {id, role, actionLabel, line, lineName, lineTone, station, stations[], remind, status, current, timer}

  if (mode === 'direct') {
    const stations = getStationsBetween(sLine, sStation, sDir, eStation);
    if (stations.length < 2) { showAlert('⚠️', '路线错误', '请检查方向是否正确'); return; }
    legs.push({ id:'start', role:'起点', actionLabel:'已上车', line: sLine.replace('号线',''), lineName: sLine, lineTone: lineColors[sLine], station: sStation, stations, remind: false, status: 'active', current: 0, timer: null });
    legs.push({ id:'end', role:'终点', actionLabel:'已下车', line: sLine.replace('号线',''), lineName: sLine, lineTone: lineColors[sLine], station: eStation, stations: [], remind: false, status: 'upcoming', current: 0, timer: null });
  } else {
    const tStation = document.getElementById('transferStation').value;
    const tLine = document.getElementById('transferLine').value;
    const tDir = document.getElementById('transferDirection').value;
    const tR = parseInt(document.getElementById('transferRemindN').value) || 1;
    if (!tStation || !tLine || !tDir) { showAlert('⚠️', '信息不完整', '请填写完整的换乘信息'); return; }
    const leg1 = getStationsBetween(sLine, sStation, sDir, tStation);
    const leg2 = getStationsBetween(tLine, tStation, tDir, eStation);
    if (leg1.length < 2) { showAlert('⚠️', '路线错误', '起点到换乘站方向有误'); return; }
    if (leg2.length < 2) { showAlert('⚠️', '路线错误', '换乘站到终点方向有误'); return; }

    legs.push({ id:'start', role:'起点', actionLabel:'已上车', line: sLine.replace('号线',''), lineName: sLine, lineTone: lineColors[sLine], station: sStation, stations: leg1, remind: false, status: 'active', current: 0, timer: null });
    legs.push({ id:'transfer', role:'换乘', actionLabel:'已上车', line: tLine.replace('号线',''), lineName: tLine, lineTone: lineColors[tLine], station: tStation, stations: leg2, remind: false, status: 'upcoming', current: 0, timer: null, remindN: tR });
    legs.push({ id:'end', role:'终点', actionLabel:'已下车', line: tLine.replace('号线',''), lineName: tLine, lineTone: lineColors[tLine], station: eStation, stations: [], remind: false, status: 'upcoming', current: 0, timer: null });
  }

  J = { legs, endRemindN: eR, remindFired: {} };
  if (Notification.permission === 'default') Notification.requestPermission();
  document.getElementById('setupSection').classList.add('hidden');
  document.getElementById('journeySection').classList.remove('hidden');
  renderJourney();
}

// ===== Render Journey =====
function renderJourney() {
  if (!J) return;
  const legs = J.legs;
  const doneCount = legs.filter(l => l.status === 'done').length;
  const allDone = doneCount === legs.length;
  const totalStations = legs.reduce((s, l) => s + Math.max(0, l.stations.length - 1), 0);

  // Header
  document.getElementById('jHeaderTitle').textContent = allDone ? '已抵达' : '今日通勤';
  document.getElementById('jHeaderHint').innerHTML = allDone
    ? '行程结束 · 祝你今天顺利'
    : `预计 <b>${totalStations * 2}</b> 分钟 · 共 ${totalStations} 站`;

  // Progress track
  renderProgressTrack();
  // Cards
  renderCards();
}

function renderProgressTrack() {
  const legs = J.legs;
  const track = document.getElementById('progressTrack');
  let html = '';
  legs.forEach((leg, i) => {
    const isDone = leg.status === 'done';
    const isCurrent = leg.status === 'active' || leg.status === 'riding';
    const dotCls = isDone ? 'done' : isCurrent ? 'active' : '';
    const labelCls = (isDone || isCurrent) ? 'lit' : '';
    html += `<div class="progress-node">
      <span class="progress-dot ${dotCls}"></span>
      <span class="progress-node-label ${labelCls}">${leg.role}</span>
    </div>`;
    if (i < legs.length - 1) {
      const fillCls = isDone ? 'done' : '';
      const fillW = isDone ? '100%' : isCurrent ? '60%' : '0%';
      html += `<div class="progress-line"><div class="progress-line-fill ${fillCls}" style="width:${fillW}"></div></div>`;
    }
  });
  track.innerHTML = html;
}

function renderCards() {
  const legs = J.legs;
  const container = document.getElementById('jCards');
  let html = '';

  legs.forEach((leg, i) => {
    if (leg.status === 'done') {
      html += renderDoneCard(leg, i);
    } else if (leg.id === 'end') {
      html += renderEndCard(leg, i);
    } else {
      html += renderActiveCard(leg, i);
    }
    // Connector between non-last cards
    if (i < legs.length - 1) {
      const isActive = leg.status === 'done';
      const dotColor = isActive ? 'var(--accent)' : 'var(--ink-mute)';
      const labelColor = isActive ? 'var(--accent)' : 'var(--ink-mute)';
      const labelText = leg.stations.length > 1 ? `约 ${(leg.stations.length - 1) * 2} 分钟车程` : '';
      html += `<div class="j-connector">
        <div class="j-connector-dots">
          <span style="background:${dotColor};opacity:0.6"></span>
          <span style="background:${dotColor};opacity:0.8"></span>
          <span style="background:${dotColor}"></span>
        </div>
        <span class="j-connector-label" style="color:${labelColor}">${labelText}</span>
      </div>`;
    }
  });

  container.innerHTML = html;
}

function renderDoneCard(leg, i) {
  return `<div class="j-card done-card">
    <div class="done-row">
      <span class="done-check">${SVG.check('#fbf8f1', 10)}</span>
      <div class="done-info">
        <div class="done-title">${leg.role} · ${leg.station}</div>
        <div class="done-hint">${leg.lineName} · 已完成</div>
      </div>
      <button class="done-undo" onclick="undoLeg(${i})">撤销</button>
    </div>
  </div>`;
}

function renderActiveCard(leg, i) {
  const isActive = leg.status === 'active';
  const isRiding = leg.status === 'riding';
  const isUpcoming = leg.status === 'upcoming';
  const cls = isActive ? 'active' : isRiding ? 'active' : isUpcoming ? 'upcoming' : '';
  const tone = leg.lineTone || 'var(--ink)';
  const pinyin = getPinyin(leg.station);

  const totalSt = leg.stations.length - 1;
  const remaining = totalSt - leg.current;
  let detailText = '';
  if (isRiding) {
    const dest = leg.stations[leg.stations.length - 1];
    detailText = `在车上 · 当前 ${leg.stations[leg.current]} · 还有 ${remaining} 站到 ${dest}`;
  } else if (isActive) {
    detailText = `共 ${totalSt} 站 · 朝 ${leg.stations[leg.stations.length - 1]} 方向`;
  } else {
    detailText = `等待前序完成`;
  }

  const remindBar = (isActive || isRiding) ? renderRemindBar(leg, i, isRiding) : '';
  const advanceBtn = isRiding ? `<div class="j-btn-row" style="margin-top:6px">
    <button class="btn-advance" onclick="advanceLeg(${i})">过站 +1${remaining > 0 ? '（下一站：' + leg.stations[leg.current + 1] + '）' : ''}</button>
  </div>` : '';

  return `<div class="j-card ${cls}">
    <div class="j-card-header">
      <span class="line-badge" style="background:${tone}1a;color:${tone};border:1.5px solid ${tone}70">${leg.line}</span>
      <div style="flex:1;min-width:0">
        <div class="j-card-role" style="color:${isActive || isRiding ? 'var(--accent)' : 'var(--ink-mute)'}">${leg.role} · ${leg.lineName}</div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <span class="j-card-station">${leg.station}</span>
          ${pinyin ? `<span class="j-card-pinyin">${pinyin}</span>` : ''}
        </div>
        <div class="j-card-detail">${detailText}</div>
      </div>
    </div>
    ${remindBar}
    <div class="j-btn-row">
      <button class="btn-primary" ${isUpcoming || isRiding ? 'disabled' : ''} onclick="actionLeg(${i})">
        ${isRiding ? SVG.check('#fbf8f1', 13) + ' 已确认' : leg.actionLabel}
      </button>
      <button class="btn-ghost ${leg.remind ? 'remind-on' : ''}" ${isUpcoming ? 'disabled' : ''} onclick="toggleRemind(${i})">
        ${leg.remind ? SVG.bell(leg.remind ? '#fbf8f1' : 'currentColor', 13) + ' 提醒已开' : SVG.bellOff('currentColor', 13) + ' 提醒'}
      </button>
    </div>
    ${advanceBtn}
  </div>`;
}

function renderEndCard(leg, i) {
  const isUpcoming = leg.status === 'upcoming';
  const cls = leg.status === 'active' ? 'active' : isUpcoming ? 'upcoming' : '';
  const tone = leg.lineTone || 'var(--ink)';
  const pinyin = getPinyin(leg.station);

  return `<div class="j-card ${cls}">
    <div class="j-card-header">
      <span class="line-badge" style="background:${tone}1a;color:${tone};border:1.5px solid ${tone}70">${leg.line}</span>
      <div style="flex:1;min-width:0">
        <div class="j-card-role" style="color:${leg.status === 'active' ? 'var(--accent)' : 'var(--ink-mute)'}">${leg.role} · ${leg.lineName}</div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <span class="j-card-station">${leg.station}</span>
          ${pinyin ? `<span class="j-card-pinyin">${pinyin}</span>` : ''}
        </div>
        <div class="j-card-detail">终点站</div>
      </div>
    </div>
    <div class="j-btn-row">
      <button class="btn-primary" ${isUpcoming ? 'disabled' : ''} onclick="actionLeg(${i})">${leg.actionLabel}</button>
      <button class="btn-ghost ${leg.remind ? 'remind-on' : ''}" ${isUpcoming ? 'disabled' : ''} onclick="toggleRemind(${i})">
        ${leg.remind ? SVG.bell('#fbf8f1', 13) + ' 提醒已开' : SVG.bellOff('currentColor', 13) + ' 提醒'}
      </button>
    </div>
  </div>`;
}

function renderRemindBar(leg, i, isRiding) {
  const remindN = leg.remindN || J.endRemindN || 1;
  if (leg.remind) {
    return `<div class="remind-bar on">
      ${SVG.bell('var(--accent)', 11)}
      <span style="flex:1">到站前 ${remindN} 站推送提醒</span>
      ${isRiding ? '<span class="listening-badge"><span class="pulse-dot"></span>监听中</span>' : ''}
    </div>`;
  }
  return `<div class="remind-bar off">
    ${SVG.bellOff('var(--ink-mute)', 11)}
    <span style="flex:1">未开启到站提醒</span>
  </div>`;
}

// ===== Journey Actions =====
function actionLeg(i) {
  const leg = J.legs[i];
  if (leg.id === 'end') {
    // Alight
    leg.status = 'done';
    // Also mark the riding leg before as done if not already
    const ridingLeg = J.legs.find(l => l.status === 'riding');
    if (ridingLeg) {
      if (ridingLeg.timer) clearInterval(ridingLeg.timer);
      ridingLeg.status = 'done';
    }
  } else if (leg.status === 'active') {
    // Board → riding
    leg.status = 'riding';
    leg.current = 0;
    startTimer(i);
    // If direct mode, enable end card
    if (mode === 'direct' || leg.id === 'transfer') {
      const endLeg = J.legs.find(l => l.id === 'end');
      if (endLeg && endLeg.status === 'upcoming') endLeg.status = 'active';
    }
  } else if (leg.status === 'riding') {
    // Confirm done
    if (leg.timer) clearInterval(leg.timer);
    leg.status = 'done';
    // Activate next
    if (i + 1 < J.legs.length && J.legs[i + 1].status === 'upcoming') {
      J.legs[i + 1].status = 'active';
    }
  }
  renderJourney();
}

function undoLeg(i) {
  const leg = J.legs[i];
  if (leg.timer) clearInterval(leg.timer);
  leg.status = 'active';
  leg.current = 0;
  for (let j = i + 1; j < J.legs.length; j++) {
    const l = J.legs[j];
    if (l.timer) clearInterval(l.timer);
    l.status = 'upcoming';
    l.current = 0;
  }
  J.remindFired = {};
  renderJourney();
}

function toggleRemind(i) {
  J.legs[i].remind = !J.legs[i].remind;
  if (Notification.permission === 'default') Notification.requestPermission();
  renderJourney();
}

function advanceLeg(i) {
  const leg = J.legs[i];
  const total = leg.stations.length - 1;
  if (leg.current < total) {
    leg.current++;
    checkReminder(i);
    renderJourney();
  }
}

function startTimer(i) {
  const leg = J.legs[i];
  let elapsed = 0;
  if (leg.timer) clearInterval(leg.timer);
  leg.timer = setInterval(() => {
    elapsed++;
    if (elapsed % 120 === 0 && leg.current < leg.stations.length - 1) {
      leg.current++;
      checkReminder(i);
      renderJourney();
    }
  }, 1000);
}

function checkReminder(i) {
  const leg = J.legs[i];
  const total = leg.stations.length - 1;
  const remaining = total - leg.current;
  const remindN = leg.remindN || J.endRemindN || 1;
  const key = leg.id + '_' + i;

  if (remaining <= remindN && leg.remind && !J.remindFired[key]) {
    J.remindFired[key] = true;
    playAlert();
    const dest = leg.stations[total];
    if (leg.id === 'start' && J.legs.length > 2) {
      showAlert('🔄', '换乘提醒', `还有 ${remaining} 站到达 ${dest}，请准备换乘`);
      sendNotification('换乘提醒', `还有 ${remaining} 站到达${dest}`);
    } else {
      showAlert('🚉', '到站提醒', `还有 ${remaining} 站到达 ${dest}，请准备下车`);
      sendNotification('到站提醒', `还有 ${remaining} 站到达${dest}`);
    }
  }

  if (remaining === 0) {
    if (leg.timer) clearInterval(leg.timer);
    leg.status = 'done';
    if (i + 1 < J.legs.length && J.legs[i + 1].status === 'upcoming') {
      J.legs[i + 1].status = 'active';
    }
    if (!J.remindFired[key] && leg.remind) {
      playAlert();
      showAlert('🔔', '已到站', `已到达 ${leg.stations[total]}`);
    }
    renderJourney();
  }
}

function resetJourney() {
  if (J) J.legs.forEach(l => { if (l.timer) clearInterval(l.timer); });
  J = null;
  document.getElementById('journeySection').classList.add('hidden');
  document.getElementById('setupSection').classList.remove('hidden');
}

// ===== Audio =====
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playAlert() {
  try {
    const ctx = getAudioCtx();
    const beep = (f, t, d) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + d);
      o.start(t); o.stop(t + d);
    };
    const n = ctx.currentTime;
    beep(880, n, 0.15); beep(1100, n + 0.18, 0.15);
    beep(880, n + 0.36, 0.15); beep(1100, n + 0.54, 0.2);
  } catch(e) {}
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);
}

function showAlert(icon, title, msg) {
  document.getElementById('alertIcon').textContent = icon;
  document.getElementById('alertTitle').textContent = title;
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertOverlay').classList.add('show');
}
function dismissAlert() { document.getElementById('alertOverlay').classList.remove('show'); }

function sendNotification(title, body) {
  if (Notification.permission === 'granted') new Notification(title, { body });
}

document.addEventListener('DOMContentLoaded', initLines);
document.addEventListener('keydown', e => { if (e.key === 'Escape') dismissAlert(); });
if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
</script>
